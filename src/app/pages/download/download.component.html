<section
  class="text-gray-600 dark:text-gray-400 dark:bg-gray-900 bg-white body-font overflow-hidden"
>
  <div
    class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center"
  >
    <nav
      class="md:ml-auto flex flex-wrap items-center text-base justify-center"
    >
      <a
        ariaCurrentWhenActive="page"
        routerLinkActive="active"
        routerLink="/download/minesweeper"
        class="mr-5 dark:hover:text-white hover:text-gray-900"
        >Minesweeper</a
      >
      <a
        ariaCurrentWhenActive="page"
        routerLinkActive="active"
        routerLink="/download/tetris"
        class="mr-5 dark:hover:text-white hover:text-gray-900"
        >Tetris</a
      >
      <!-- <a
      ariaCurrentWhenActive="page"
      routerLinkActive="active"
      routerLink="/download/my-radio-wave"
      class="mr-5 dark:hover:text-white hover:text-gray-900"
      >My Radio Wave</a
    > -->
    </nav>
  </div>

  <div
    [@routeTransition]="route.snapshot.data"
    [@.disabled]="isRouteTransitionDisabled"
    style="display: contents"
  >
    <router-outlet></router-outlet>
  </div>
</section>
